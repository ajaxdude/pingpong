<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Requests Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 40px;
    }
    h1 { font-size: 1.7rem; color: #2980b9; margin-bottom: 28px; }
    .status-banner {
      margin-bottom: 30px;
      padding: 14px 22px;
      border-radius: 6px;
      font-size: 1.12rem;
      color: #fff;
      font-weight: 500;
    }
    .status-ok { background: #27ae60; }
    .status-error { background: #e74c3c; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }
    th, td {
      padding: 14px 10px;
      border-bottom: 1px solid #eee;
      font-size: 1.01rem;
    }
    th {
      background: #f8f9fa;
      text-align: left;
      font-weight: 600;
      color: #555;
    }
    tr:last-child td { border-bottom: none; }
    .error { color: #e74c3c; font-weight: bold; }
    .pending { color: #e67e22; }
    .approved { color: #27ae60; }
    .escalated { color: #2980b9; }
    .iteration {
      font-size: 1.01rem;
      background: #eaeaea;
      border-radius: 4px;
      padding: 2px 8px;
      margin-left: 6px;
    }
    .action-link { color: #2980b9; text-decoration: underline; cursor: pointer; }
    .feedback-cell { max-width: 340px; white-space: pre-wrap; word-break: break-word; }
    .timestamp {
      font-size: 0.93rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Review Requests Dashboard</h1>
    <div id="statusBanner" class="status-banner status-ok">Loading status...</div>
    <table id="requestsTable">
      <thead>
        <tr>
          <th>Task ID</th>
          <th>Status</th>
          <th>Iteration</th>
          <th>Summary</th>
          <th>Reviewer</th>
          <th>LLM Feedback</th>
          <th>Human Feedback</th>
          <th>Created</th>
          <th>Updated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="errorBox" class="status-banner status-error" style="display:none;">API error</div>
  </div>
<script>
async function fetchSessions() {
  try {
    const res = await fetch('/api/sessions');
    const data = await res.json();
    if (!data.sessions) throw new Error('Malformed response');
    return data.sessions;
  } catch (err) {
    throw err;
  }
}

async function fetchHealth() {
  try {
    const res = await fetch('/api/health');
    const health = await res.json();
    return health.status === 'healthy';
  } catch (err) {
    return false;
  }
}

function renderStatusBanner(healthy) {
  const banner = document.getElementById('statusBanner');
  if (healthy) {
    banner.textContent = 'LLM backend is healthy and connected.';
    banner.className = 'status-banner status-ok';
  } else {
    banner.textContent = 'LLM backend is not healthy or unreachable.';
    banner.className = 'status-banner status-error';
  }
}

function renderTable(sessions) {
  const tbody = document.querySelector('#requestsTable tbody');
  tbody.innerHTML = '';
  if (!sessions.length) {
    const row = document.createElement('tr');
    const cell = document.createElement('td');
    cell.colSpan = 10;
    cell.textContent = 'No review requests found.';
    row.appendChild(cell);
    tbody.appendChild(row);
    return;
  }
  sessions.forEach(s => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${s.taskId}</td>
      <td class="${s.status}">${s.status}</td>
      <td><span class="iteration">${s.iterationCount}</span></td>
      <td>${s.summary || ''}</td>
      <td>${s.reviewerType || ''}</td>
      <td class="feedback-cell">${s.llmFeedback || ''}</td>
      <td class="feedback-cell">${s.humanFeedback || ''}</td>
      <td class="timestamp">${new Date(s.createdAt).toLocaleString()}</td>
      <td class="timestamp">${new Date(s.updatedAt).toLocaleString()}</td>
      <td><a href="/review/${s.id}" class="action-link">View</a></td>
    `;
    tbody.appendChild(row);
  });
}

async function refresh() {
  try {
    const healthy = await fetchHealth();
    renderStatusBanner(healthy);
    const sessions = await fetchSessions();
    renderTable(sessions);
    document.getElementById('errorBox').style.display = 'none';
  } catch (err) {
    document.getElementById('errorBox').style.display = '';
    document.getElementById('errorBox').textContent = 'Failed to fetch review requests: ' + err.message;
  }
}

refresh();
setInterval(refresh, 6000);
</script>
</body>
</html>
